<!DOCTYPE html>
<html>
<head>
  <title>Collection | LOI Fashion</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid #111;
    }

    .home-icon {
      width: 100px;
      cursor: pointer;
      transition: 0.3s;
    }

    .home-icon:hover {
      transform: scale(1.1);
      filter: brightness(1.3);
    }

    /* MAIN SECTION */
    .main {
      height: 85vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .coming {
      font-family: 'Playfair Display', serif;
      font-size: 90px; /* 🔥 BIG */
      letter-spacing: 6px;
      margin: 0;
    }

    .soon {
      font-family: 'Playfair Display', serif;
      font-size: 90px;
      letter-spacing: 6px;
      color: #c9a86a;
      margin: 0;
    }

    .subtext {
      margin-top: 25px;
      color: #888;
      font-size: 14px;
      letter-spacing: 2px;
    }

    /* LINE EFFECT */
    .line {
      width: 120px;
      height: 1px;
      background: #c9a86a;
      margin: 25px auto;
    }

    /* HEADER */
.faq-header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 20px;
  position: sticky;
  top: 0;
  background: #000;
  z-index: 999;
  border-bottom: 1px solid #111;
}

/* LEFT ICON */
.left {
  justify-self: start;
}

.icon-svg {
  width: 28px;
  height: 28px;
  transition: 0.3s;
}

.icon-svg:hover {
  transform: scale(1.15);
}

/* CENTER LOGO */
.center {
  justify-self: center;
}

.logo {
  height: 70px;
}

/* RIGHT EMPTY */
.right {
  justify-self: end;
}

  </style>
</head>

<body>

  <body>

<!-- HEADER -->
<header class="faq-header">

  <!-- HOME ICON (LEFT) -->
  <div class="left">
    <a href="index.html">
      <img src="home.svg" class="icon-svg">
    </a>
  </div>

  <!-- LOGO (CENTER) -->
  <div class="center">
    <img src="head-logo.png" class="logo">
  </div>

  <!-- EMPTY RIGHT (for balance) -->
  <div class="right"></div>

</header>

<div class="main">
  
  <h1 class="coming">COMING</h1>
  <h1 class="soon">SOON</h1>

  <div class="line"></div>

  <p class="subtext">
    A new era of minimal luxury is on its way.
  </p>

</div>

</body>
</html>
