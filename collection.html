<!DOCTYPE html>
<html>
<head>
  <title>Collection - LOI Fashion</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    /* HEADER */
    header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 20px 60px;
    }

    nav a {
      color: white;
      margin-right: 25px;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 2px;
    }

    nav a:hover {
      color: gold;
    }

    .logo {
      height: 55px;
    }

    /* HERO / CENTER CONTENT */
    .coming {
      height: 70vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
    }

    .coming h1 {
      font-family: 'Playfair Display', serif;
      font-size: 50px;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .coming p {
      color: #aaa;
      letter-spacing: 2px;
      font-size: 13px;
    }

    .line {
      width: 80px;
      height: 1px;
      background: gold;
      margin: 20px auto;
    }

    /* FOOTER */
    .footer {
      padding: 20px 40px;
      border-top: 1px solid #222;
      font-size: 12px;
      color: #777;
      position: absolute;
      bottom: 0;
      width: 100%;
    }

    .footer-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-center img {
      width: 18px;
      margin: 0 6px;
    }

    .footer-right a {
      margin-left: 15px;
      color: #777;
      text-decoration: none;
    }

    .footer-right a:hover {
      color: gold;
    }

  </style>
</head>

<body>

<header>
  <nav>
    <a href="index.html">HOME</a>
    <a href="collection.html">COLLECTION</a>
    <a href="about.html">ABOUT</a>
    <a href="index.html#contact">CONTACT</a>
  </nav>

  <img src="loi.svg" class="logo">
  <div></div>
</header>

<!-- COMING SOON -->
<div class="coming">
  <h1>COLLECTION</h1>
  <div class="line"></div>
  <p>COMING SOON</p>
</div>

<!-- FOOTER -->
<footer class="footer">

  <div class="footer-top">
    <div>© 2026 LOI Fashion</div>

    <div class="footer-center">
      <img src="https://cdn-icons-png.flaticon.com/24/733/733547.png">
      <img src="https://cdn-icons-png.flaticon.com/24/733/733585.png">
      <img src="https://cdn-icons-png.flaticon.com/24/5968/5968764.png">
      <img src="https://cdn-icons-png.flaticon.com/24/733/733609.png">
    </div>

    <div class="footer-right">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Refund</a>
    </div>
  </div>

</footer>

</body>
</html>
