<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOI Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
  display: flex;
  height: 100vh;
}

/* LEFT BANNER */
.left {
  flex: 1;
  background: url('Banner.png') center/cover no-repeat;
}

/* RIGHT SIDE */
.right {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px;
}

/* TITLE */
h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.subtitle {
  color: #c9a86a;
  margin-bottom: 30px;
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  background: black;
  border: 1px solid #c9a86a;
  color: white;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #c9a86a;
  border: none;
  cursor: pointer;
}

button:hover {
  opacity: 0.85;
}

/* SWITCH TEXT */
.switch {
  margin-top: 20px;
  font-size: 13px;
}

.switch span {
  color: #c9a86a;
  cursor: pointer;
}

/* HIDE */
.hidden {
  display: none;
}

#msg {
  margin-top: 10px;
  color: #c9a86a;
}
</style>

</head>

<body>

<!-- LEFT -->

<div class="left"></div>

<!-- RIGHT -->

<div class="right">

  <h1>WELCOME TO LOI</h1>
  <p class="subtitle">Luxury Begins Here</p>

  <!-- LOGIN FORM -->

  <div id="loginBox">
    <input type="text" id="email" placeholder="Email or Phone Number">
    <input type="password" id="password" placeholder="Password">

```
<button onclick="login()">Login</button>

<div class="switch">
  I don’t have an account?
  <span onclick="showSignup()">Create account for LOI</span>
</div>
```

  </div>

  <!-- SIGNUP FORM -->

  <div id="signupBox" class="hidden">

```
<input type="email" id="signupEmail" placeholder="Email">
<input type="text" id="phone" placeholder="Phone Number">

<input type="password" id="signupPass" placeholder="Password">
<input type="password" id="confirmPass" placeholder="Confirm Password">

<select id="region">
  <option>Region</option>
  <option>India</option>
  <option>UAE</option>
  <option>UK</option>
  <option>Other</option>
</select>

<select id="title">
  <option>Called as?</option>
  <option>Mr</option>
  <option>Mrs</option>
  <option>Miss</option>
  <option>Other</option>
</select>

<button onclick="signup()">Create Account</button>

<div class="switch">
  Already have an account?
  <span onclick="showLogin()">Login</span>
</div>
```

  </div>

  <p id="msg"></p>

</div>

<!-- FIREBASE -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEodih-ToCBTVjMmqC7JFmGvR7qDcdM-8",
  authDomain: "loi7-1ddfc.firebaseapp.com",
  projectId: "loi7-1ddfc",
  appId: "1:777558781536:web:ed9252fe4adaa0d93e9d05"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const msg = document.getElementById("msg");

/* SWITCH UI */
window.showSignup = () => {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("signupBox").classList.remove("hidden");
};

window.showLogin = () => {
  document.getElementById("signupBox").classList.add("hidden");
  document.getElementById("loginBox").classList.remove("hidden");
};

/* LOGIN */
window.login = async function () {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    window.location.href = "dashboard.html";
  } catch (err) {
    msg.innerText = err.message;
  }
};

/* SIGNUP */
window.signup = async function () {
  const email = document.getElementById("signupEmail").value;
  const pass = document.getElementById("signupPass").value;
  const confirm = document.getElementById("confirmPass").value;

  if (pass !== confirm) {
    msg.innerText = "Passwords do not match";
    return;
  }

  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    msg.innerText = "Account Created Successfully";
    showLogin();
  } catch (err) {
    msg.innerText = err.message;
  }
};
</script>

</body>
</html>
