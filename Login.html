<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOI Login</title>

<style>
body {
  background: #000;
  color: #fff; 
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.box {
  width: 320px;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  background: black;
  border: 1px solid #c9a86a;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #c9a86a;
  border: none;
  cursor: pointer;
}

button:hover {
  opacity: 0.85;
}

#msg {
  margin-top: 10px;
  font-size: 14px;
  color: #c9a86a;
}
</style>

</head>

<body>

<div class="box">
  <h2>LOI LOGIN</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button> <button onclick="signup()">Create Account</button>

  <p id="msg"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEodih-ToCBTVjMmqC7JFmGvR7qDcdM-8",
  authDomain: "loi7-1ddfc.firebaseapp.com",
  projectId: "loi7-1ddfc",
  storageBucket: "loi7-1ddfc.firebasestorage.app",
  messagingSenderId: "777558781536",
  appId: "1:777558781536:web:ed9252fe4adaa0d93e9d05"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const msg = document.getElementById("msg");

window.login = function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      msg.innerText = "Login Successful";
      window.location.href = "dashboard.html";
    })
    .catch(err => msg.innerText = err.message);
};

window.signup = function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => msg.innerText = "Account Created Successfully")
    .catch(err => msg.innerText = err.message);
};

</script>

</body>
</html>
